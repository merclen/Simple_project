<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High School English Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #4A90E2, #A8E6CF);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .game-container {
      max-width: 700px;
      margin: auto;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    }
    h1, h2 {
      margin: 10px 0;
    }
    #score, #timer {
      font-size: 18px;
      margin-bottom: 10px;
      color: #ffcc00;
    }
    button.choice {
      background-color: #ff7f50;
      color: white;
      width: 100%;
      margin: 10px 0;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 5px;
      transition: 0.3s;
      cursor: pointer;
    }
    button.choice:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
    #end-message, #leaderboard {
      display: none;
      font-size: 20px;
      margin-top: 20px;
    }
    #restart, #show-leaderboard {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>📚 High School English Quiz ✏️</h1>
    <p id="category-select">
      Select Category:
      <select id="category">
        <option value="grammar">Grammar</option>
        <option value="vocab">Vocabulary</option>
        <option value="literature">Literature</option>
      </select>
      <button onclick="startQuiz()">Start Quiz</button>
    </p>
    <p id="score"></p>
    <p id="timer"></p>
    <h2 id="question"></h2>
    <div id="choices"></div>
    <p id="end-message"></p>
    <button id="restart" onclick="restartGame()">Restart Quiz</button>
    <button id="show-leaderboard" onclick="displayLeaderboard()">Show Leaderboard</button>
    <div id="leaderboard"></div>
  </div>

  <script>
    const allQuestions = {
      grammar: [
        ["Which sentence uses correct subject-verb agreement?", "Each of the students are present.", "Each of the students is present.", "Each student are present.", 2],
        ["Choose the passive voice sentence:", "She completed the project.", "The project was completed by her.", "She is completing the project.", 2],
        ["Identify the correct sentence:", "He gave me an advice.", "He gave me a piece of advice.", "He gave me advices.", 2],
        ["Which is a plural form of 'phenomenon'?", "Phenomenons", "Phenomena", "Phenomenes", 2],
        // Add more grammar questions...
      ],
      vocab: [
        ["Which of the following is an adverb?", "Quickly", "Bright", "Intelligent", 1],
        ["Which word is a synonym for 'eloquent'?", "Persuasive", "Silent", "Unclear", 1],
        ["Which of these is an oxymoron?", "Jumbo shrimp", "As fast as a cheetah", "The stars danced", 1],
        // Add more vocab questions...
      ],
      literature: [
        ["Who wrote 'Romeo and Juliet'?", "Charles Dickens", "William Shakespeare", "Mark Twain", 2],
        ["Which sentence contains an idiom?", "The sun is shining.", "She let the cat out of the bag.", "He ran fast.", 2],
        ["Figure of speech in 'The wind whispered'?", "Simile", "Metaphor", "Personification", 3],
        // Add more literature questions...
      ]
    };

    let questions = [], current = 0, score = 0, startTime, timerInterval, selectedCategory;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function startQuiz() {
      selectedCategory = document.getElementById("category").value;
      questions = shuffle([...allQuestions[selectedCategory]]).slice(0, 20);
      current = score = 0;
      document.getElementById("category-select").style.display = "none";
      document.getElementById("score").style.display = "block";
      document.getElementById("timer").style.display = "block";
      startTime = new Date();
      timerInterval = setInterval(updateTimer, 1000);
      updateScore();
      showQuestion();
    }

    function updateTimer() {
      const seconds = Math.floor((new Date() - startTime) / 1000);
      document.getElementById("timer").innerText = `⏱ Time: ${seconds}s`;
    }

    function updateScore() {
      document.getElementById("score").innerText = `🌟 Score: ${score}`;
    }

    function showQuestion() {
      if (current >= questions.length) return endQuiz();
      const [q, c1, c2, c3, correct] = questions[current];
      document.getElementById("question").innerText = q;
      const choicesDiv = document.getElementById("choices");
      choicesDiv.innerHTML = "";
      [c1, c2, c3].forEach((choice, i) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.innerText = choice;
        btn.onclick = () => handleChoice(i + 1, correct);
        choicesDiv.appendChild(btn);
      });
    }

    function handleChoice(choice, correct) {
      if (choice === correct) score += 10;
      else score -= 5;
      current++;
      updateScore();
      showQuestion();
    }

    function endQuiz() {
      clearInterval(timerInterval);
      const timeTaken = Math.floor((new Date() - startTime) / 1000);
      document.getElementById("question").style.display = "none";
      document.getElementById("choices").style.display = "none";
      document.getElementById("end-message").style.display = "block";
      document.getElementById("restart").style.display = "inline-block";
      document.getElementById("show-leaderboard").style.display = "inline-block";
      document.getElementById("end-message").innerText = `Quiz completed! Your score: ${score} | Time: ${timeTaken}s`;

      const name = prompt("Enter your name for the leaderboard:");
      const leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]");
      leaderboard.push({ name, score, time: timeTaken, category: selectedCategory });
      leaderboard.sort((a, b) => b.score - a.score || a.time - b.time);
      localStorage.setItem("leaderboard", JSON.stringify(leaderboard.slice(0, 10)));
    }

    function restartGame() {
      location.reload();
    }

    function displayLeaderboard() {
      const board = JSON.parse(localStorage.getItem("leaderboard") || "[]");
      const div = document.getElementById("leaderboard");
      div.style.display = "block";
      div.innerHTML = "<h3>🏆 Leaderboard</h3><ol>" +
        board.map(entry => `<li>${entry.name} - ${entry.score} pts - ${entry.time}s - ${entry.category}</li>`).join("") +
        "</ol>";
    }
  </script>
</body>
</html>
