<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High School English Quiz</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #4A90E2, #A8E6CF);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .game-container {
            max-width: 600px;
            margin: auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }
        #question {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #score {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        button {
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
            cursor: pointer;
        }
        button:nth-child(odd) { background-color: #ff5733; }
        button:nth-child(even) { background-color: #33c3ff; }
        button:hover { transform: scale(1.05); opacity: 0.9; }
        #end-message {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
            display: none;
        }
        #restart {
            display: none;
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>📚 High School English Quiz ✏️</h1>
        <p id="score"></p>
        <h2 id="question"></h2>
        <button id="choice1" onclick="handleChoice(1)"></button>
        <button id="choice2" onclick="handleChoice(2)"></button>
        <button id="choice3" onclick="handleChoice(3)"></button>
        <p id="end-message"></p>
        <button id="restart" onclick="restartGame()">Restart Quiz</button>
    </div>

    <script>
        let score = 0, questionNumber = 1, gameOver = false;

        function updateScore() {
            document.getElementById("score").innerHTML = `🌟 Score: ${score}`;
        }

        function updateQuestion() {
            if (gameOver) return showEnding();

            let questions = {
                1: ["Which sentence uses correct subject-verb agreement?", 
                    "Each of the students are present.", 
                    "Each of the students is present.", 
                    "Each student are present.", 2],

                2: ["Which of the following is an **adverb**?", 
                    "Quickly", 
                    "Bright", 
                    "Intelligent", 1],

                3: ["Which figure of speech is used in: 'The wind whispered through the trees'?", 
                    "Simile", 
                    "Metaphor", 
                    "Personification", 3],

                4: ["Which word is a synonym for 'eloquent'?", 
                    "Persuasive", 
                    "Silent", 
                    "Unclear", 1],

                5: ["Who wrote 'Romeo and Juliet'?", 
                    "Charles Dickens", 
                    "William Shakespeare", 
                    "Mark Twain", 2],

                6: ["Which of these is an example of an **oxymoron**?", 
                    "Jumbo shrimp", 
                    "As fast as a cheetah", 
                    "The stars danced in the sky", 1],

                7: ["Identify the **correct** sentence:", 
                    "He gave me an advice.", 
                    "He gave me a piece of advice.", 
                    "He gave me advices.", 2],

                8: ["Choose the **passive voice** sentence:", 
                    "She completed the project.", 
                    "The project was completed by her.", 
                    "She is completing the project.", 2],

                9: ["What is the **plural** of 'phenomenon'?", 
                    "Phenomenons", 
                    "Phenomena", 
                    "Phenomenes", 2],

                10: ["Which sentence contains an **idiom**?", 
                    "The sun is shining brightly.", 
                    "She let the cat out of the bag.", 
                    "He ran faster than a cheetah.", 2]
            };

            if (questionNumber in questions) {
                let [text, choice1, choice2, choice3, correctAnswer] = questions[questionNumber];
                document.getElementById("question").innerHTML = text;
                document.getElementById("choice1").innerHTML = choice1;
                document.getElementById("choice2").innerHTML = choice2;
                document.getElementById("choice3").innerHTML = choice3;
                document.getElementById("choice1").setAttribute("data-answer", correctAnswer);
                document.getElementById("choice2").setAttribute("data-answer", correctAnswer);
                document.getElementById("choice3").setAttribute("data-answer", correctAnswer);
            } else {
                showEnding();
            }
        }

        function handleChoice(choice) {
            if (gameOver) return;

            let correctAnswer = parseInt(document.getElementById(`choice${choice}`).getAttribute("data-answer"));

            if (choice === correctAnswer) {
                score += 10;
            } else {
                score -= 5;
            }

            questionNumber++;

            if (questionNumber > 10) {
                gameOver = true;
                document.getElementById("end-message").innerHTML = score >= 40 
                    ? "🎉 Congratulations! You passed the quiz! 🎉"
                    : "💀 You failed the quiz. Try again.";
            }

            updateScore();
            updateQuestion();
        }

        function showEnding() {
            document.getElementById("question").style.display = "none";
            document.getElementById("score").style.display = "none";
            document.getElementById("choice1").style.display = "none";
            document.getElementById("choice2").style.display = "none";
            document.getElementById("choice3").style.display = "none";
            document.getElementById("end-message").style.display = "block";
            document.getElementById("restart").style.display = "block";
        }

        function restartGame() {
            score = 0;
            questionNumber = 1;
            gameOver = false;

            document.getElementById("question").style.display = "block";
            document.getElementById("score").style.display = "block";
            document.getElementById("choice1").style.display = "block";
            document.getElementById("choice2").style.display = "block";
            document.getElementById("choice3").style.display = "block";
            document.getElementById("end-message").style.display = "none";
            document.getElementById("restart").style.display = "none";

            updateScore();
            updateQuestion();
        }

        updateScore();
        updateQuestion();
    </script>
</body>
</html>
