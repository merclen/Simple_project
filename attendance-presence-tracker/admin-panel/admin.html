<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="../assets/css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="wrapper">

<!-- Sidebar -->
<aside class="sidebar">
<h2>Pulse</h2>
<a href="./admin.html">Dashboard</a>
<a href="./students.html">Students</a>
<a href="./reports.html">Reports</a>
<a href="./tutorial.html">Tutorial</a>
<a href="./">Logout</a>
</aside>

<!-- Main -->
<main class="main">

<!-- Top Bar -->
<div class="topbar d-flex justify-content-between align-items-center mb-3">
    <h3>Admin Dashboard</h3>
    <div id="clock" class="clock">
        <div class="time"></div>
        <div class="date"></div>
    </div>
</div>

<!-- Stats Cards -->
<div class="stats mb-4">
<div class="card blue"><div class="card-title">Male Inside</div><div class="card-value" id="maleCount">0</div></div>
<div class="card pink"><div class="card-title">Female Inside</div><div class="card-value" id="femaleCount">0</div></div>
<div class="card green"><div class="card-title">Total Today</div><div class="card-value" id="totalToday">0</div></div>
<div class="card orange"><div class="card-title">Total Visits</div><div class="card-value" id="totalVisits">0</div></div>
</div>

<!-- Attendance Table -->
<section class="table-container mb-4">

<div class="table-header d-flex justify-content-between align-items-center mb-2">
<div class="table-title">Attendance Sheet</div>
<button class="export-btn" onclick="exportExcel()">Export Excel</button>
</div>

<div class="table-tools mb-2">
<input type="text" id="searchInput" placeholder="Search Student ID or Name..." class="search-bar form-control">
</div>

<table class="table table-striped" id="attendanceTableMain">
<thead>
<tr>
<th onclick="sortTable('id')">Student ID</th>
<th onclick="sortTable('name')">Name</th>
<th onclick="sortTable('gender')">Gender</th>
<th onclick="sortTable('morningCheckIn')">Morning In</th>
<th onclick="sortTable('morningCheckOut')">Morning Out</th>
<th onclick="sortTable('afternoonCheckIn')">Afternoon In</th>
<th onclick="sortTable('afternoonCheckOut')">Afternoon Out</th>
<th>Status</th>
</tr>
</thead>
<tbody id="attendanceTable"></tbody>
</table>
</section>

<!-- Charts -->
<div class="charts row">
<div class="col-md-6 mb-3">
<canvas id="weeklyChart"></canvas>
</div>
<div class="col-md-6 mb-3">
<canvas id="monthlyChart"></canvas>
</div>
</div>

</main>
</div>

<script src="../assets/js/admin.js"></script>
</body>
</html>
