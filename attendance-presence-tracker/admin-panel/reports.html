<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="../assets/css/admin.css">
<link rel="stylesheet" href="../assets/css/reports.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <h2>Pulse</h2>
    <a href="./admin.html">Dashboard</a>
    <a href="./students.html">Students</a>
    <a href="./reports.html">Reports</a>
    <a href="./tutorial.html">Tutorial</a>
    <a href="./">Logout</a>
</aside>

<!-- Main Content -->
<main class="main">

    <div class="topbar d-flex justify-content-between align-items-center mb-4">
        <h3>Admin Reports</h3>
    </div>

    <!-- Export Controls -->
    <div class="export-controls mb-4">
        <label class="mb-2">Export History:</label><br>
        <button class="export-btn" onclick="exportExcelMultiSheet('year')">Export Full History (Yearly)</button>
        <button class="export-btn" onclick="exportExcelMultiSheet('month')">Export Monthly Attendance</button>
        <button class="export-btn" onclick="exportExcelMultiSheet('week')">Export Weekly Attendance</button>
    </div>

    <!-- Charts -->
    <div class="charts">
        <div class="col-md-6">
            <canvas id="weeklyChartReport"></canvas>
        </div>
        <div class="col-md-6">
            <canvas id="monthlyChartReport"></canvas>
        </div>
    </div>

</main>

<script src="../assets/js/reports.js"></script>
</body>
</html>
