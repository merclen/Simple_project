<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/admin.css">
<link rel="stylesheet" href="../assets/css/students.css">

</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <h2>Pulse</h2>
    <a href="./admin.html">Dashboard</a>
    <a href="./students.html">Students</a>
    <a href="./reports.html">Reports</a>
    <a href="./tutorial.html">Tutorial</a>
    <a href="./">Logout</a>
</aside>

<!-- Main Content -->
<div class="main-content">
    <div class="table-container">
        <div class="table-header">
            <h4>Registered Students</h4>
            <button class="register" id="openRegister">Register</button>
        </div>

        <p id="studentCount" class="text-muted"></p>

        <input type="text" id="search" placeholder="Search by name or ID...">

        <table class="table table-bordered table-striped mt-3">
            <thead class="table-dark">
                <tr>
                    <th onclick="sortTable('name')">Full Name ⬍</th>
                    <th onclick="sortTable('id')">School ID ⬍</th>
                    <th onclick="sortTable('gender')">Gender ⬍</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>

        <p id="noData" class="text-center text-muted"></p>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="registerModal">
    <div class="modal-dialog">
        <div class="modal-content p-4">
            <h4 id="modalTitle" class="text-center mb-3">Register Student</h4>

            <form id="studentForm">
                <input type="hidden" id="editIndex">
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" id="fullName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>School ID</label>
                    <input type="text" id="schoolId" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Gender</label>
                    <select id="gender" class="form-select" required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save</button>
            </form>
            <div id="message" class="text-center mt-2"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/students.js"></script>
</body>
</html>
